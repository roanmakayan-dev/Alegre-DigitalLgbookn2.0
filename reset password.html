<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Digital Logbook</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-image: url('assets/bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }

        .header {
            background: #fff;
            color: #1f2937;
            padding: 30px 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e5e7eb;
        }

        .school-logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #003D7A;
            border-radius: 50%;
            font-size: 40px;
            color: #003D7A;
            background: #f0f4f8;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1f2937;
        }

        .header p {
            font-size: 13px;
            color: #6b7280;
        }

        .body {
            padding: 40px 30px;
        }

        .step {
            animation: fadeIn 0.3s ease;
        }

        .step.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #003D7A;
            box-shadow: 0 0 0 3px rgba(0, 61, 122, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #003D7A;
            color: #fff;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            margin-top: 25px;
        }

        .auth-btn:hover {
            background: #002754;
            box-shadow: 0 8px 20px rgba(0, 61, 122, 0.3);
        }

        .auth-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            box-shadow: none;
        }

        .skip-btn {
            width: 100%;
            padding: 14px;
            background: #e5e7eb;
            color: #374151;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            margin-top: 12px;
        }

        .skip-btn:hover {
            background: #d1d5db;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .error-msg {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            border-left: 4px solid #dc2626;
        }

        .error-msg.show {
            display: block;
        }

        .success-msg {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            border-left: 4px solid #22c55e;
        }

        .success-msg.show {
            display: block;
        }

        .timer-text {
            font-size: 13px;
            color: #6b7280;
            margin-top: 10px;
            text-align: center;
        }

        .resend-btn {
            background: none;
            border: none;
            color: #003D7A;
            text-decoration: underline;
            cursor: pointer;
            font-size: 13px;
            padding: 0;
            width: 100%;
            margin-top: 10px;
            font-weight: 600;
        }

        .resend-btn:hover:not(:disabled) {
            color: #002754;
        }

        .resend-btn:disabled {
            color: #d1d5db;
            cursor: not-allowed;
            text-decoration: none;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
        }

        .back-link a {
            color: #003D7A;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .back-btn {
            background: none;
            border: none;
            color: #003D7A;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        .back-btn:hover {
            text-decoration: underline;
        }

        .description {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
        }

        @media (max-width: 480px) {
            .container {
                border-radius: 12px;
            }

            .header {
                padding: 25px 20px 15px;
            }

            .header h1 {
                font-size: 20px;
            }

            .body {
                padding: 25px 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="school-logo">
                <i class="fas fa-key"></i>
            </div>
            <h1>Digital Logbook System</h1>
        </div>

        <div class="body">
            <div id="errorMessage" class="error-msg"></div>
            <div id="successMessage" class="success-msg"></div>

            <!-- Step 1: Enter Email -->
            <div id="emailStep" class="step">
                <div class="description">Enter your email address to reset your password.</div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email address" required>
                </div>
                <button class="auth-btn" id="sendCodeBtn">Send Reset Code</button>
            </div>

            <!-- Step 2: Enter Verification Code -->
            <div id="codeStep" class="step hidden">
                <div class="description">Enter the verification code to proceed.</div>
                <div class="form-group">
                    <label for="verificationCode">Verification Code</label>
                    <input type="text" id="verificationCode" placeholder="Enter 6-digit code" maxlength="6" required>
                </div>
                <button class="auth-btn" id="verifyCodeBtn">Verify Code</button>
                <div class="timer-text" id="timer"></div>
                <button class="resend-btn" id="resendBtn" disabled>Resend Code</button>
            </div>

            <!-- Step 3: Reset Password -->
            <div id="resetStep" class="step hidden">
                <div class="description">Enter your new password.</div>
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" placeholder="Create a new password (min. 6 characters)" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your new password" required>
                </div>
                <button class="auth-btn" id="resetPasswordBtn">Reset Password</button>
            </div>

            <div class="back-link">
                <button class="back-btn" id="backBtn">Back to Login</button>
            </div>
        </div>
    </div>

    <script>
        let timerInterval;
        let timeLeft = 60;
        let generatedCode = '';
        let resetEmail = '';
        let resetUserRole = '';

        // Bottom control updater: changes label and action based on current step
        function updateBottomControl() {
            const backBtn = document.getElementById('backBtn');
            const emailStep = document.getElementById('emailStep');
            const codeStep = document.getElementById('codeStep');
            const resetStep = document.getElementById('resetStep');

            if (!resetStep.classList.contains('hidden')) {
                backBtn.textContent = 'Skip';
            } else if (!codeStep.classList.contains('hidden')) {
                backBtn.textContent = 'Back';
            } else {
                backBtn.textContent = 'Back to Login';
            }
        }

        // Bottom button (backBtn) click - behavior changes depending on step
        document.getElementById('backBtn').addEventListener('click', function() {
            const codeStep = document.getElementById('codeStep');
            const resetStep = document.getElementById('resetStep');

            if (!resetStep.classList.contains('hidden')) {
                // On reset step -> Skip action - set password to code, then go to user's dashboard
                const users = JSON.parse(localStorage.getItem('users')) || [];
                const userIndex = users.findIndex(u => u.email && u.email.toLowerCase() === resetEmail.toLowerCase());
                if (userIndex !== -1) {
                    users[userIndex].password = generatedCode;
                    localStorage.setItem('users', JSON.stringify(users));
                }
                const role = resetUserRole || 'student';
                if (role === 'admin') {
                    window.location.href = 'home.html';
                } else if (role === 'senior') {
                    window.location.href = 'senior.html';
                } else if (role === 'junior') {
                    window.location.href = 'junior dashboard.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
                return;
            }

            if (!codeStep.classList.contains('hidden')) {
                // On verification step -> go back to email step
                hideStep('codeStep');
                showStep('emailStep');
                clearInterval(timerInterval);
                const ver = document.getElementById('verificationCode'); if (ver) ver.value = '';
                document.getElementById('errorMessage').classList.remove('show');
                updateBottomControl();
                return;
            }

            // Default (email step): go to login
            window.location.href = 'student login.html';
        });

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => errorEl.classList.remove('show'), 3000);
        }

        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.classList.add('show');
        }

        function hideStep(stepId) {
            document.getElementById(stepId).classList.add('hidden');
        }

        function showStep(stepId) {
            document.getElementById(stepId).classList.remove('hidden');
        }

        // Step 1: Send Code
        document.getElementById("sendCodeBtn").addEventListener("click", function() {
            const email = document.getElementById("email").value.trim();
            
            if (!email) {
                showError('Please enter your email address.');
                return;
            }

            // Check if email exists
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.email && u.email.toLowerCase() === email.toLowerCase());

            if (!user) {
                showError('Email address not found in the system.');
                return;
            }

            // Store the user's role for later use when skipping
            resetUserRole = user.role || 'student';

            // Generate verification code
            generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
            resetEmail = email;

            alert(`Demo: Your verification code is: ${generatedCode}`);

            // Move to code verification step
            hideStep('emailStep');
            showStep('codeStep');
            document.getElementById('errorMessage').classList.remove('show');
            updateBottomControl();

            // Start timer
            startTimer();
        });

        function startTimer() {
            timeLeft = 60;
            updateTimerDisplay();
            document.getElementById("resendBtn").disabled = true;

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById("resendBtn").disabled = false;
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            if (timeLeft > 0) {
                document.getElementById("timer").textContent = `Resend code in ${timeLeft} seconds`;
            } else {
                document.getElementById("timer").textContent = 'Code expired. You can resend.';
            }
        }

        // Resend Code Button
        document.getElementById("resendBtn").addEventListener("click", function() {
            generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
            alert(`Demo: Your new verification code is: ${generatedCode}`);
            startTimer();
            document.getElementById('verificationCode').value = '';
            document.getElementById('errorMessage').classList.remove('show');
        });

        // Step 2: Verify Code
        document.getElementById("verifyCodeBtn").addEventListener("click", function() {
            const enteredCode = document.getElementById("verificationCode").value.trim();

            if (!enteredCode) {
                showError('Please enter the verification code.');
                return;
            }

            if (enteredCode === generatedCode) {
                clearInterval(timerInterval);
                hideStep('codeStep');
                showStep('resetStep');
                document.getElementById('errorMessage').classList.remove('show');
                updateBottomControl();
            } else {
                showError('Invalid verification code. Please try again.');
            }
        });

        // Step 3: Reset Password
        document.getElementById("resetPasswordBtn").addEventListener("click", function() {
            const newPassword = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (!newPassword || !confirmPassword) {
                showError('Please enter both password fields.');
                return;
            }

            if (newPassword.length < 6) {
                showError('Password must be at least 6 characters long.');
                return;
            }

            if (newPassword !== confirmPassword) {
                showError('Passwords do not match.');
                return;
            }

            // Update user password in localStorage
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const userIndex = users.findIndex(u => u.email && u.email.toLowerCase() === resetEmail.toLowerCase());

            if (userIndex !== -1) {
                users[userIndex].password = newPassword;
                localStorage.setItem('users', JSON.stringify(users));

                const resetBtn = document.getElementById("resetPasswordBtn");
                resetBtn.innerHTML = 'Resetting...';
                resetBtn.disabled = true;

                showSuccess('Password reset successfully! Redirecting to login...');

                setTimeout(() => {
                    window.location.href = 'student login.html';
                }, 1500);
            } else {
                showError('An error occurred. Please try again.');
            }
        });

        // Clear error on input
        document.getElementById("email").addEventListener("input", () => {
            document.getElementById('errorMessage').classList.remove('show');
        });

        document.getElementById("verificationCode").addEventListener("input", () => {
            document.getElementById('errorMessage').classList.remove('show');
        });

        document.getElementById("newPassword").addEventListener("input", () => {
            document.getElementById('errorMessage').classList.remove('show');
        });

        document.getElementById("confirmPassword").addEventListener("input", () => {
            document.getElementById('errorMessage').classList.remove('show');
        });

        // Initialize bottom control on page load
        updateBottomControl();
    </script>
</body>

</html>
