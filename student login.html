<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login | Digital Logbook</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background-image: url('/assets/mouse.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('assets/bg.jpg');
      background-size: cover;
      background-position: center;
      filter: blur(10px);
      z-index: -1;
    }

    .auth-container {
      background-image: url('assets/bg.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-color: #ffffff;
      position: relative;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 500px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .auth-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.05);
      z-index: 1;
      pointer-events: none;
    }

    /* Header + logo */
    .auth-header {
      background: transparent;
      color: #ffffff;
      padding: 30px 30px 20px;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .school-logo {
      width: 100px;
      height: 100px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 40px;
      background-image: url('assets/logo.png');
      background-size: cover;
      background-position: center;
    }

    .auth-header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      display: block;
      color: black;
    }

    .auth-body {
      padding: 40px 30px;
      position: relative;
      z-index: 2;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      color: #333333;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #000000;
      border-radius: 6px;
      background-color: #ffffff;
      color: #333333;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
    }

    .form-group input::placeholder,
    .form-group select::placeholder {
      color: #999999;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #003D7A;
      box-shadow: 0 0 0 3px rgba(0, 61, 122, 0.1);
    }

    .auth-btn {
      width: 100%;
      padding: 14px;
      background: #003D7A;
      color: #fff;
      border: none;
      border-radius: 25px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 16px;
      margin-top: 25px;
    }

    .auth-btn:hover {
      background: #002754;
      box-shadow: 0 8px 20px rgba(0, 61, 122, 0.3);
    }

    .auth-link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      color: #333333;
    }

    .auth-link a {
      color: #1E90FF;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .auth-link a:hover {
      color: #00BFFF;
      text-decoration: underline;
    }

    .error-msg {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-size: 14px;
      border-left: 4px solid #dc2626;
    }

    .error-msg.show {
      display: block;
    }

    .success-msg {
      background: #dcfce7;
      color: #166534;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-size: 14px;
      border-left: 4px solid #22c55e;
    }

    .success-msg.show {
      display: block;
    }

    @media (max-width: 480px) {
      .auth-container {
        border-radius: 12px;
      }

      .auth-body {
        padding: 30px 20px;
      }
    }
  </style>
</head>

<body>

  <a href="select role.html" class="back-link" style="position:fixed;top:20px;left:20px;color:#003D7A;text-decoration:none;font-weight:600;z-index:100;background:rgba(255,255,255,0.95);padding:10px 15px;border-radius:6px;">
    <i class="fas fa-arrow-left"></i> Back
  </a>

  <div class="auth-container">
    <div class="auth-header">
      <div class="school-logo"></div>
      <h1>Student Login</h1>
    </div>
    <div class="auth-body">
      <div class="error-msg" id="studentError"></div>
      <div class="success-msg" id="studentSuccess"></div>

      <form id="studentForm" onsubmit="handleStudentLoginForm(event)">
        <div class="form-group">
          <label for="studentLRN">Student LRN</label>
          <input type="text" id="studentLRN" name="studentLRN" required placeholder="Enter your LRN">
        </div>

        <div class="form-group">
          <label for="studentPassword">Password</label>
          <input type="password" id="studentPassword" name="studentPassword" required
            placeholder="Enter your password">
        </div>

        <button type="submit" class="auth-btn">
          Login
        </button>
      </form>

      <p class="auth-link" style="text-align: center; margin-top: 20px; font-size: 13px;">
        <a href="reset password.html" style="color: #0B2D72;">Forgot password?</a>
      </p>
      <p class="auth-link" style="text-align: center; margin-top: 10px; font-size: 13px;">
        Don't have an account? <a href="signup.html" style="color: #0B2D72;">Sign up</a>
      </p>
    </div>
  </div>

  <script>
    // Utility functions
    function showError(elementId, message) {
      const element = document.getElementById(elementId);
      element.textContent = message;
      element.innerHTML = message;
      element.classList.add('show');
      clearMessages(elementId);
    }

    function showSuccess(elementId, message) {
      const element = document.getElementById(elementId);
      element.textContent = message;
      element.innerHTML = message;
      element.classList.add('show');
    }

    function clearMessages(exclude = null) {
      const errors = document.querySelectorAll('.error-msg.show');
      const successes = document.querySelectorAll('.success-msg.show');

      errors.forEach(e => {
        if (!exclude || e.id !== exclude) {
          setTimeout(() => e.classList.remove('show'), 3000);
        }
      });

      successes.forEach(s => {
        if (!exclude || s.id !== exclude) {
          setTimeout(() => s.classList.remove('show'), 3000);
        }
      });
    }

    // Handle Student Login Form
    function handleStudentLoginForm(event) {
      event.preventDefault();

      const lrn = document.getElementById('studentLRN').value.trim();
      const password = document.getElementById('studentPassword').value.trim();

      if (!lrn || !password) {
        showError('studentError', 'Please fill in all fields.');
        return;
      }

      handleStudentLogin(lrn, password);
    }

    // Student Login Handler
    function handleStudentLogin(lrn, password) {
      const users = JSON.parse(localStorage.getItem('users')) || [];
      const user = users.find(u => u.lrn && u.lrn.toLowerCase() === lrn.toLowerCase());

      if (!user) {
        showError('studentError', 'Student not found. Please check your LRN.');
        return;
      }

      if (user.password !== password) {
        showError('studentError', 'Incorrect password. Please try again.');
        return;
      }

      // Store current user with their role from signup
      localStorage.setItem('currentUser', JSON.stringify({
        lrn: user.lrn,
        fullName: user.fullName,
        email: user.email,
        role: user.role || 'student'
      }));

      showSuccess('studentSuccess', 'Login successful! Redirecting...');
      setTimeout(() => {
        // Redirect based on user's role selected during signup
        if (user.role === 'senior') {
          window.location.href = 'senior.html';
        } else if (user.role === 'junior') {
          window.location.href = 'junior mobile.html';
        } else {
          // Fallback to student role selection
          window.location.href = 'student role.html';
        }
      }, 500);
    }

    // Check if already logged in
    window.addEventListener('DOMContentLoaded', function () {
      const currentUser = localStorage.getItem('currentUser');
      if (currentUser) {
        const user = JSON.parse(currentUser);
        if (user.role === 'senior') {
          window.location.href = 'senior.html';
        } else if (user.role === 'junior') {
          window.location.href = 'junior mobile.html';
        }
      }
    });
  </script>

</body>

</html>
